name: build-eicoops
on:
  push:
    paths:
      - pnpm-lock.yaml
      - 'lib/**'
      - 'ui/**'
      - 'eicoop/**'
      - 'periodicals/data/*'
      - '!periodicals/data/events.json'
      - 'protobuf/ei.proto'
  pull_request:
    types: [opened, synchronize, edited, reopened]
    paths:
      - 'lib/**'
      - 'ui/**'
      - 'eicoop/**'
      - 'periodicals/*'
  workflow_dispatch:

permissions:
  contents: read
  #schedule:
  # Regenerate every day to incorporate updated mission outcome data.
  # - cron: '30 4 * * *'
jobs:
  # No TS type checking for faster deployment.
  eicoop-fastbuild:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.event_name != 'pull_request'
    defaults:
      run:
        working-directory: eicoop
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-global/pnpm-lock.yaml
      - name: Cache netlify-headers-expander
        uses: actions/cache@v5
        with:
          path: eicoop/netlify-headers-expander
          key: netlify-headers-expander-1.0.0
      - name: Do other preparations
        run: |
          ../action-scripts/prepare
      - name: Build lib
        working-directory: lib
        run: |
          make init
          make
      - name: Build site
        run: make fastbuild
      - uses: ./.github/actions/netlify-deploy
        with:
          dist-dir: eicoop/dist
          site-id: ${{ secrets.NETLIFY_EICOOP_SITE_ID }}
          auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}

  # With TS type checking.
  eicoop-fullbuild:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eicoop
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-node
        with:
          cache-dependency-path: |
            pnpm-lock.yaml
            pnpm-global/pnpm-lock.yaml
      - name: Cache netlify-headers-expander
        uses: actions/cache@v5
        with:
          path: eicoop/netlify-headers-expander
          key: netlify-headers-expander-1.0.0
      - name: Do other preparations
        run: |
          ../action-scripts/prepare
      - name: Build lib
        working-directory: lib
        run: |
          make init
          make
      - name: Build site
        run: make
