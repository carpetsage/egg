name: build-wasmegg
on:
  push:
    paths:
      - '.github/workflows/build-wasmegg.yml'
      - pnpm-lock.yaml
      - 'wasmegg/**'
      - 'ui/**'
      - 'lib/**'
      - 'periodicals/*'
      - 'periodicals/data/*'
      - '!periodicals/data/contracts.json'
      - '!periodicals/data/seasoncontracts.json'
      - 'protobuf/ei.proto'
  pull_request:
    types: [opened, edited, reopened, synchronize]
    paths:
      - '.github/workflows/build-wasmegg.yml'
      - 'lib/**'
      - 'ui/**'
      - 'wasmegg/**'
      - 'periodicals/*'
      - 'periodicals/data/*'
  workflow_dispatch:
  #schedule:
  # Regenerate every day to incorporate updated mission outcome data.
  # Cron moved to cloudflare worker for more reliable timing
  # - cron: '30 4 * * *'
permissions:
  contents: read

jobs:
  # No TS type checking for faster deployment.
  wasmegg-fastbuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.actor != 'dependabot[bot]' && github.event_name != 'pull_request'
    concurrency:
      group: ${{ github.workflow }}-fastbuild-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: wasmegg
    steps:
      - uses: actions/checkout@v7
      - name: Set up protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          basename=protoc-gen-doc-1.4.1.linux-amd64.go1.15.2
          wget https://github.com/pseudomuto/protoc-gen-doc/releases/download/v1.4.1/$basename.tar.gz
          echo '2e476c67063af55a5608f7ef876260eb4ca400b330b762a4f59096db501c5c8c  '$basename.tar.gz | sha256sum -c -
          tar xf $basename.tar.gz
          echo "$PWD/$basename" >> $GITHUB_PATH
      - name: Set up ets
        run: |
          wget https://github.com/zmwangx/ets/releases/download/v0.2.1/ets_0.2.1_linux_amd64.deb
          echo '759703ab432d52da4def118f98a7f811c0ec59354afad7151f08cba8f09f6171  ets_0.2.1_linux_amd64.deb' | sha256sum -c -
          sudo dpkg -i ets_0.2.1_linux_amd64.deb
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.22'
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Configure pnpm global bin
        run: |
          pnpm config set global-bin-dir $GITHUB_WORKSPACE/pnpm-global
          echo $GITHUB_WORKSPACE/pnpm-global >> $GITHUB_PATH
        if: github.event_name != 'pull_request'
      - name: Install netlify cli
        run: pnpm add --global netlify-cli
        if: github.event_name != 'pull_request'
      - name: Do other preparations
        run: |
          ../action-scripts/prepare
      - name: Build lib
        working-directory: lib
        run: |
          make init
          make
      - name: Initialize dependencies
        run: |
          make init -j1
      - name: Build
        run: |
          make -j2 fastbuild
        env:
          EIAPI_TOKEN: ${{ secrets.EIAPI_TOKEN }}
      - name: Deploy
        run: |
          netlify deploy --prod -d $GITHUB_WORKSPACE/wasmegg/dist
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_WASMEGG_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      - name: Deploy to branch-specific URL
        run: |
          BRANCH_SLUG=$(echo "$GITHUB_REF_NAME" | sed 's/[^a-zA-Z0-9-]/-/g')
          netlify deploy --alias "$BRANCH_SLUG" -d $GITHUB_WORKSPACE/wasmegg/dist
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_WASMEGG_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        if: github.ref != 'refs/heads/main' && github.event_name != 'pull_request'
      - name: Deploy to commit-specific URL
        run: |
          netlify deploy --alias "$GITHUB_SHA" -d $GITHUB_WORKSPACE/wasmegg/dist
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_WASMEGG_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        if: github.event_name != 'pull_request'

  # With TS type checking.
  wasmegg-fullbuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'
    concurrency:
      group: ${{ github.workflow }}-fullbuild-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: wasmegg
    steps:
      - uses: actions/checkout@v7
      - name: Set up protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          basename=protoc-gen-doc-1.4.1.linux-amd64.go1.15.2
          wget https://github.com/pseudomuto/protoc-gen-doc/releases/download/v1.4.1/$basename.tar.gz
          echo '2e476c67063af55a5608f7ef876260eb4ca400b330b762a4f59096db501c5c8c  '$basename.tar.gz | sha256sum -c -
          tar xf $basename.tar.gz
          echo "$PWD/$basename" >> $GITHUB_PATH
      - name: Set up ets
        run: |
          wget https://github.com/zmwangx/ets/releases/download/v0.2.1/ets_0.2.1_linux_amd64.deb
          echo '759703ab432d52da4def118f98a7f811c0ec59354afad7151f08cba8f09f6171  ets_0.2.1_linux_amd64.deb' | sha256sum -c -
          sudo dpkg -i ets_0.2.1_linux_amd64.deb
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '^1.22'
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Configure pnpm global bin
        run: |
          pnpm config set global-bin-dir $GITHUB_WORKSPACE/pnpm-global
          echo $GITHUB_WORKSPACE/pnpm-global >> $GITHUB_PATH
        if: github.event_name != 'pull_request'
      - name: Install netlify cli
        run: pnpm add --global netlify-cli
        if: github.event_name != 'pull_request'
      - name: Do other preparations
        run: |
          ../action-scripts/prepare
      - name: Build lib
        working-directory: lib
        run: |
          make init
          make
      - name: Initialize dependencies
        run: |
          make init -j1
      - name: Build
        run: |
          make -j2
        env:
          EIAPI_TOKEN: ${{ secrets.EIAPI_TOKEN }}
