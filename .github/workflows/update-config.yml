name: update-config-gist
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'
permissions:
  contents: read

jobs:
  update:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: periodicals
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '>=1.24'
      - name: Fetch config
        run: |
          go run main.go ei.pb.go getconfig
        env:
          EI_USERID: ${{ secrets.EI_USERID }}
      - name: Update Gist if changed
        run: |
          if [ ! -s config.json ]; then
            echo "config.json is empty, skipping"
            exit 0
          fi
          changed=false
          for file in config.json custom_ce_shells.json live_config.json; do
            gh gist view "$GIST_ID" --filename "$file" > "/tmp/gist_$file" 2>/dev/null || true
            if ! diff -q "$file" "/tmp/gist_$file" > /dev/null 2>&1; then
              echo "$file changed"
              changed=true
            fi
          done
          if [ "$changed" = true ]; then
            echo "Updating gist"
            jq -n \
              --rawfile config config.json \
              --rawfile shells custom_ce_shells.json \
              --rawfile live live_config.json \
              '{"files":{"config.json":{"content":$config},"custom_ce_shells.json":{"content":$shells},"live_config.json":{"content":$live}}}' \
              | gh api --method PATCH "/gists/$GIST_ID" --input - --silent
          else
            echo "No change"
          fi
        env:
          GH_TOKEN: ${{ secrets.GIST_UPDATER_TOKEN }}
          GIST_ID: ${{ secrets.EGG_CONFIG_GIST_ID }}
