name: update-config-gist
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */1 * * *'
jobs:
  update:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: periodicals
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '>=1.24'
      - name: Fetch config
        run: |
          go run main.go ei.pb.go getconfig
        env:
          EI_USERID: ${{ secrets.EI_USERID }}
      - name: Update Gist if changed
        run: |
          if [ ! -s config.json ]; then
            echo "config.json is empty, skipping"
            exit 0
          fi
          gh gist view "$GIST_ID" --filename config.json > /tmp/gist_config.json 2>/dev/null || true
          if ! diff -q config.json /tmp/gist_config.json > /dev/null 2>&1; then
            echo "Config changed, updating gist"
            jq -n --rawfile content config.json '{"files":{"config.json":{"content":$content}}}' \
              | gh api --method PATCH "/gists/$GIST_ID" --input -
          else
            echo "No change"
          fi
        env:
          GH_TOKEN: ${{ secrets.GIST_UPDATER_TOKEN }}
          GIST_ID: ${{ secrets.EGG_CONFIG_GIST_ID }}
