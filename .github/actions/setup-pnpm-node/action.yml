name: 'Set up pnpm and Node'
description: 'Install pnpm and configure Node.js with caching'
inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  cache-dependency-path:
    description: 'Paths to dependency lock files for pnpm cache'
    required: false
    default: 'pnpm-lock.yaml'
runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v5.0.0
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
        cache-dependency-path: ${{ inputs.cache-dependency-path }}